events {
    worker_connections 1024;
}

http {
    # ──────────────────────────────────────────────────
    # Custom log format including upstream response time
    # ──────────────────────────────────────────────────
    log_format custom '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'upstream_response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log custom;
    error_log  /var/log/nginx/error.log warn;

    # ──────────────────────────────────────────────────
    # Upstream: US backend (with EU as fallback)
    # ──────────────────────────────────────────────────
    upstream us_backend {
        server backend-us:8000 max_fails=2 fail_timeout=10s;
        server backend-eu:8000 backup;
    }

    # ──────────────────────────────────────────────────
    # Upstream: EU backend (with US as fallback)
    # ──────────────────────────────────────────────────
    upstream eu_backend {
        server backend-eu:8000 max_fails=2 fail_timeout=10s;
        server backend-us:8000 backup;
    }

    server {
        listen 80;
        server_name _;

        # ──────────────────────────────────────────────
        # Route /us/* → US backend (fallback to EU)
        # ──────────────────────────────────────────────
        location /us/ {
            proxy_pass         http://us_backend/us/;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──────────────────────────────────────────────
        # Route /eu/* → EU backend (fallback to US)
        # ──────────────────────────────────────────────
        location /eu/ {
            proxy_pass         http://eu_backend/eu/;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root health check
        location /health {
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
