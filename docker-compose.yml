
services:
  # ─────────────────────────────────────────
  # Zookeeper (Kafka dependency)
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc -w 2 localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ─────────────────────────────────────────
  # Kafka Broker
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 60s

  # ─────────────────────────────────────────
  # US PostgreSQL Database
  # ─────────────────────────────────────────
  db-us:
    image: postgres:14
    container_name: db_us
    environment:
      POSTGRES_DB: ${POSTGRES_US_DB}
      POSTGRES_USER: ${POSTGRES_US_USER}
      POSTGRES_PASSWORD: ${POSTGRES_US_PASSWORD}
    volumes:
      - db_us_data:/var/lib/postgresql/data
      - ./seeds/init-us.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_US_USER} -d ${POSTGRES_US_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # EU PostgreSQL Database
  # ─────────────────────────────────────────
  db-eu:
    image: postgres:14
    container_name: db_eu
    environment:
      POSTGRES_DB: ${POSTGRES_EU_DB}
      POSTGRES_USER: ${POSTGRES_EU_USER}
      POSTGRES_PASSWORD: ${POSTGRES_EU_PASSWORD}
    volumes:
      - db_eu_data:/var/lib/postgresql/data
      - ./seeds/init-eu.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_EU_USER} -d ${POSTGRES_EU_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # US Backend Service
  # ─────────────────────────────────────────
  backend-us:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_us
    environment:
      REGION: us
      DATABASE_URL: postgresql://postgres:postgres_us_secret@db-us:5432/properties_us
      KAFKA_BROKER: kafka:29092
      PORT: 8000
    depends_on:
      db-us:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/us/health"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ─────────────────────────────────────────
  # EU Backend Service
  # ─────────────────────────────────────────
  backend-eu:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_eu
    environment:
      REGION: eu
      DATABASE_URL: postgresql://postgres:postgres_eu_secret@db-eu:5432/properties_eu
      KAFKA_BROKER: kafka:29092
      PORT: 8000
    depends_on:
      db-eu:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/eu/health"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ─────────────────────────────────────────
  # NGINX Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      backend-us:
        condition: service_healthy
      backend-eu:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_us_data:
  db_eu_data:
